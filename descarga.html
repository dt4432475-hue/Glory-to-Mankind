<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descarga - Glory to Mankind</title>
    <!-- Tus hojas de estilos oficiales -->
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

    <!-- Contenedor Principal de Descargas -->
    <div class="download-container">
        
        <!-- Detalle de Cabecera del Aporte -->
        <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 25px;">
            <img id="app-icon" src="" alt="Icono" style="width: 80px; height: 80px; border-radius: 12px; object-fit: cover;">
            <div>
                <h1 id="app-title" style="margin: 0; font-size: 1.8rem; color: #fff;">Cargando aporte...</h1>
                <p id="app-server" style="margin: 5px 0 0 0; color: #64748b; font-size: 0.9rem;"></p>
            </div>
        </div>

        <!-- 1. Imagen de Gameplay en Horizontal (Abarca buen ancho) -->
        <div class="gameplay-banner">
            <img id="app-gameplay" src="https://placeholder.com" alt="Gameplay del juego" style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;">
        </div>

        <!-- 2. Cuadrícula de Información: Descripción y Requisitos -->
        <div class="info-grid">
            <!-- Bloque Descripción -->
            <div style="background-color: rgba(255,255,255,0.01); padding: 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.02);">
                <h3 style="color: var(--accent); margin-top: 0; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;"><i class="fa-solid fa-file-lines"></i> Descripción</h3>
                <p id="app-description" style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin: 0;">Cargando detalles e instrucciones del archivo...</p>
            </div>
            
            <!-- Bloque Requisitos -->
            <div style="background-color: rgba(255,255,255,0.01); padding: 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.02);">
                <h3 style="color: var(--accent); margin-top: 0; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;"><i class="fa-solid fa-cpu"></i> Requisitos del Sistema</h3>
                <p id="app-requirements" style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin: 0;">Cargando requisitos mínimos y recomendados...</p>
            </div>
        </div>

        <!-- Nota de Advertencia Importante (Se mantiene original) -->
        <div style="background: rgba(234, 179, 8, 0.1); border: 1px solid #eab308; padding: 15px; border-radius: 8px; color: #facc15; font-size: 0.9rem; margin-bottom: 25px;">
            <strong>Importante:</strong> Si tu explorador bloquea el enlace, haz clic derecho y selecciona "Conservar archivo". Es 100% seguro.
        </div>

        <!-- Anuncio Publicitario (Original e Intacto) -->
        <div class="ad-box" style="background: rgba(255,255,255,0.01); border: 1px dashed rgba(255,255,255,0.1); padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 25px;">
            <span style="display:block; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px;">Anuncio Publicitario</span>
            <div id="container-747d969bc7468160bc0bf92c458ef11b"></div>
        </div>

        <!-- 3. Botón Centralizador con Cuenta Regresiva (Reemplaza al Captcha) -->
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 30px 0; min-height: 80px;">
            <button id="action-btn" class="btn-action btn-generate" onclick="startCountdown()">
                <i class="fa-solid fa-key"></i> Generar enlace de descarga
            </button>
        </div>

    </div>

    <!-- Script de Lógica Interna de la Cuenta Regresiva -->
    <script>
        // Esta variable guardará temporalmente la URL real del juego
        let downloadUrl = "#";

        // Función del temporizador de 10 segundos
        function startCountdown() {
            const btn = document.getElementById('action-btn');
            let seconds = 10;

            // Bloquear botón y pasar a estado de espera
            btn.disabled = true;
            btn.className = "btn-action btn-waiting";
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Generando enlace en ${seconds}s...`;

            const interval = setInterval(() => {
                seconds--;
                if (seconds > 0) {
                    btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Generando enlace en ${seconds}s...`;
                } else {
                    clearInterval(interval);
                    // Cambiar a botón de descarga final
                    btn.disabled = false;
                    btn.className = "btn-action btn-download";
                    btn.innerHTML = `<i class="fa-solid fa-circle-down"></i> Descargar Ahora`;
                    
                    // Al hacer clic, abre el enlace real en una pestaña nueva
                    btn.onclick = () => { 
                        if(downloadUrl !== "#") {
                            window.open(downloadUrl, '_blank'); 
                        } else {
                            alert("El enlace aún no está listo o es inválido.");
                        }
                    };
                }
            }, 1000);
        }
    </script>

    <!-- Tus scripts externos oficiales cargados al final -->
    <script src="descarga.js"></script>
    <script async="async" data-cfasync="false" src="//://highrateprofit.com"></script>

</body>
</html>
