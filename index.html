<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glory to Mankind</title>
    <link rel="stylesheet" href="Estilos/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="main-banner">
        <img src="/img/baner-titulo.gif" alt="Portal Gamer" class="banner-gif">
    </header>

    <section class="featured-container">
        <div class="featured-slider" id="featuredSlider">
            <img src="Imagenes/destacado.jpg" alt="Destacado 1" class="featured-img" draggable="false">
            
            <img src="Imagenes/destacado2.jpg" alt="Destacado 2" class="featured-img" draggable="false">
            
            <img src="Imagenes/destacado3.jpg" alt="Destacado 3" class="featured-img" draggable="false">
        </div>
    </section>

    <section class="carousel-section">
        <h2>Explora nuestro contenido</h2>
        
        <div class="carousel-wrapper">
            <button class="carousel-btn prev-btn" id="prevBtn">&#10094;</button>
            
            <div class="carousel-track-container">
                <div class="carousel-track" id="carouselTrack">
                    
                    <a href="juegos.html" class="card-link">
                        <div class="game-card">
                            <img src="juegos-icon.jpg" alt="Juegos">
                            <h3>Zona Juegos</h3>
                        </div>
                    </a>

                    <a href="programas.html" class="card-link">
                        <div class="game-card">
                            <img src="programas-icon.jpg" alt="Programas">
                            <h3>Programas</h3>
                        </div>
                    </a>

                    <a href="emuladores.html" class="card-link">
                        <div class="game-card">
                            <img src="emuladores-icon.jpg" alt="Emuladores">
                            <h3>Emuladores</h3>
                        </div>
                    </a>

                    <a href="guias.html" class="card-link">
                        <div class="game-card">
                            <img src="guias-icon.jpg" alt="Guias">
                            <h3>Guías y Más</h3>
                        </div>
                    </a>

                    <a href="otros.html" class="card-link">
                        <div class="game-card">
                            <img src="otros-icon.jpg" alt="Otros">
                            <h3>Otros</h3>
                        </div>
                    </a>

                    <a href="noticias.html" class="card-link">
                        <div class="game-card">
                            <img src="noticias-icon.jpg" alt="Noticias">
                            <h3>Noticias</h3>
                        </div>
                    </a>

                    </div>
            </div>
            
            <button class="carousel-btn next-btn" id="nextBtn">&#10095;</button>
        </div>
    </section>

    <footer class="main-footer">
        <div class="social-container">
            <a href="https://discord.gg/tu-enlace" target="_blank" class="social-icon discord">
                <i class="fa-brands : fa-discord"></i>
            </a>
            <a href="https://t.me/tu-enlace" target="_blank" class="social-icon telegram">
                <i class="fa-brands fa-telegram"></i>
            </a>
            <a href="https://facebook.com/tu-enlace" target="_blank" class="social-icon facebook">
                <i class="fa-brands fa-facebook-f"></i>
            </a>
            </div>
        
        <div class="watermark">
            <p>&copy; 2026 Portal Gamer. Todos los derechos reservados. Diseñado por Bro.</p>
        </div>
    </footer>

    <script src="Funciones/script.js"></script>
</body>
</html>
