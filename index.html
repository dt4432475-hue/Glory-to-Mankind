<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Gamer - Inicio</title>
    <link rel="stylesheet" href="estilos/index.css">
</head>
<body>

    <!-- ANUNCIO TOP: Alta visibilidad al cargar la página -->
    <div class="ad-slot ad-top">Espacio Publicitario (Banner Superior)</div>

    <!-- BANNER DE INICIO -->
    <header class="gamer-banner">
        <h1>GLORY TO MANKIND</h1>
        <p>Tu dosis diaria de gaming</p>
    </header>

    <!-- NAVEGACIÓN PRINCIPAL (4 Casillas / Botones) -->
    <main class="menu-container">
        <a href="secciones/seccion1.html" class="gamer-card">
            <div class="card-icon">🎮</div>
            <h3>Sección 1</h3>
        </a>
        <a href="secciones/seccion2.html" class="gamer-card">
            <div class="card-icon">🕹️</div>
            <h3>Sección 2</h3>
        </a>
        <a href="secciones/seccion3.html" class="gamer-card">
            <div class="card-icon">🏆</div>
            <h3>Sección 3</h3>
        </a>
        <a href="secciones/seccion4.html" class="gamer-card">
            <div class="card-icon">🚀</div>
            <h3>Sección 4</h3>
        </a>
    </main>

    <!-- ANUNCIO MEDIO: Separa los botones de las novedades -->
    <div class="ad-slot ad-middle">Espacio Publicitario (Contenido)</div>

    <!-- RECUADRO DE NOVEDADES -->
    <section class="news-container">
        <h2>⚡ Últimas Novedades</h2>
        <div id="novedades-lista">
            <!-- Las novedades se cargarán dinámicamente con script.js -->
        </div>
    </section>

    <!-- FOOTER BASE -->
    <footer class="gamer-footer">
        <p>&copy; 2026 Glory To Mankind. Todos los derechos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
