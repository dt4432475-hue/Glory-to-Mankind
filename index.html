<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glory To Mankind</title>
    <link rel="stylesheet" href="estilos/index.css">

<body>

    <!-- ANUNCIO TOP: Adaptable a pantallas móviles -->
    <div class="ad-slot ad-top">Espacio Publicitario (Banner Superior)</div>

    <!-- BANNER DE INICIO -->
   <header class="gamer-banner">
       <!-- BANNER DE INICIO SIN CUADRADO EXTERIOR -->
    <div class="banner-inicio-limpio">
        <div class="banner-title-wrapper">
            <!-- GIF Izquierda -->
            <img src="img/win.gif" class="banner-decor-gif" alt="decoracion izquierda">
            
            <!-- Tu GIF de Título Principal -->
            <img src="img/baner.gif" class="banner-main-title-gif" alt="GLORY TO MANKIND">
            
            <!-- GIF Derecha -->
            <img src="img/win.gif" class="banner-decor-gif" alt="decoracion derecha">
        </div>
    </div>
    </header>

       <!-- NAVEGACIÓN PRINCIPAL (4 Casillas con Título GIF e Imagen de Referencia) -->
    <main class="menu-container">
        <!-- CASILLA 1: PROGRAMAS -->
        <a href="secciones/seccion1.html" class="gamer-card">
            <div class="card-title-box">
                <!-- Cambia 'img/win.gif' por el GIF exacto de tu título para Programas -->
                <img src="img/win.gif" class="card-title-gif" alt="Programas">
            </div>
            <div class="card-img-box">
                <img src="img/win.gif" alt="Programas PC">
            </div>
        </a>

        <!-- CASILLA 2: JUEGOS PC -->
        <a href="secciones/seccion2.html" class="gamer-card">
            <div class="card-title-box">
                <!-- Cambia 'img/baner.gif' por el GIF de tu título para Juegos PC -->
                <img src="https://i.postimg.cc/hjm4bcVH/juegospc.png" class="card-title-gif" alt="Juegos PC">
            </div>
            <div class="card-img-box">
                <img src="https://i.postimg.cc/hjm4bcVH/juegospc.png" alt="Juegos PC">
            </div>
        </a>

        <!-- CASILLA 3: APPS Y JUEGOS APK -->
        <a href="secciones/seccion3.html" class="gamer-card">
            <div class="card-title-box">
                <!-- Cambia 'img/android.png' por el GIF de tu título para APKs -->
                <img src="img/android.png" class="card-title-gif" alt="Apps y Juegos APK">
            </div>
            <div class="card-img-box">
                <img src="img/android.png" alt="Android">
            </div>
        </a>

        <!-- CASILLA 4: ISOs -->
        <a href="secciones/seccion4.html" class="gamer-card">
            <div class="card-title-box">
                <!-- Cambia 'img/footer.gif' por el GIF de tu título para ISOs -->
                <img src="img/footer.gif" class="card-title-gif" alt="ISOs">
            </div>
            <div class="card-img-box">
                <img src="img/footer.gif" alt="ISOs Discos">
            </div>
        </a>
        </main>
    <!-- ANUNCIO MEDIO -->
    <div class="ad-slot ad-middle">Espacio Publicitario (Contenido)</div>

    <!-- RECUADRO DE NOVEDADES -->
    <section class="news-container">
        <h2>⚡ Últimas Novedades</h2>
        <div id="novedades-lista">
            <!-- Cargado automáticamente por script.js -->
        </div>
    </section>

    <!-- FOOTER BASE -->
    <footer class="gamer-footer">
        <p>&copy; 2026 Glory To Mankind. Todos los derechos reservados.</p>
    </footer>

   <script src="script.js"></script>

</body>
</html>
