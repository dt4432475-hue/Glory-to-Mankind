<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technomaniac</title>
    <link rel="stylesheet" href="estilos/style.css">
</head>
<body>
    <header>
    <img src="https://i.postimg.cc/kXF5QvdF/text-(2).gif" alt="Technomaniac Games" class="gif-titulo">
</header>

<!-- Nueva Barra de Navegación Gamer -->
<nav class="barra-navegacion">
    <div class="botones-filtro">
        <button class="btn-filtro activo" data-filtro="inicio">Inicio</button>
        <button class="btn-filtro" data-filtro="pc">Juegos de PC</button>
        <button class="btn-filtro" data-filtro="android">Juegos de Android</button>
        <button class="btn-filtro" data-filtro="proyectos">Mis Proyectos</button>
    </div>
    <div class="contenedor-buscador">
        <input type="text" id="buscador" placeholder="Buscar aporte...">
    </div>
</nav>

<main>
    <!-- Título dinámico que cambiará según lo que el usuario pulse -->
    <h2 id="titulo-dinamico" class="titulo-seccion">Todos los Aportes</h2>
    
    <!-- Un solo contenedor donde se mezclará todo dinámicamente -->
    <div id="contenedor-principal" class="contenedor-juegos"></div>
</main>

<script src="./funciones/script.js"></script>

</body>
</html>
