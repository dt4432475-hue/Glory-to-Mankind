<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZonaCraftPE</title>
    <link rel="stylesheet" href="/estilos/styles.css">
</head>
<body>

    <div class="container">
        <h1>ZonaCraftPE</h1>

        <!-- Sección de APKs -->
        <h2>Descargar Minecraft APK</h2>
        <div class="grid">
            <div class="card">
                <h3>Minecraft v1.21</h3>
                <p>Versión más reciente.</p>
                <a href="#" class="btn">Descargar</a>
            </div>
        </div>

        <!-- Sección de Mods -->
        <h2>Mods Destacados</h2>
        <div class="grid">
            <div class="card">
                <h3>Mod de Muebles</h3>
                <p>Decora tu casa al máximo.</p>
                <a href="#" class="btn">Descargar</a>
            </div>
            <div class="card">
                <h3>Mod de Sombras</h3>
                <p>Gráficos ultra realistas.</p>
                <a href="#" class="btn">Descargar</a>
            </div>
        </div>

        <!-- Sección de Addons -->
        <h2>Addons</h2>
        <div class="grid">
            <div class="card">
                <h3>Addon de Dragones</h3>
                <p>Agrega dragones épicos.</p>
                <a href="#" class="btn">Descargar</a>
            </div>
        </div>
    </div>

</body>
</html>
