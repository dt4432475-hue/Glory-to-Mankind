<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Enlaces</title>
    <link rel="icon" type="image/png" href="img/logo titulo y web.png">
    <link rel="stylesheet" href="/estilos/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://quge5.com/88/tag.min.js" data-zone="242439" async data-cfasync="false"></script>
    <style>
        /* Contenedores para asegurar distribución en paralelo */
        .bloque-paralelo {
            display: flex !important;
            gap: 20px !important;
            width: 100% !important;
            margin-bottom: 20px !important;
        }

        .columna-mitad {
            flex: 1 !important;
            width: 50% !important;
            min-width: 0 !important; /* Evita desbordamiento de elementos internos */
        }

        .img-proporcional {
            width: 100% !important;
            height: 260px !important;
            object-fit: cover !important;
            border-radius: 8px !important;
            display: block !important;
        }

        /* Forzado de estilos para anular propiedades restrictivas de index.css */
        .caja-limpia {
            background-color: rgba(255,255,255,0.01) !important;
            padding: 20px !important;
            border-radius: 8px !important;
            border: 1px solid rgba(255,255,255,0.02) !important;
            margin: 0 !important;
            width: 100% !important;
            box-sizing: border-box !important;
        }

        /* Ajuste responsivo para pantallas móviles */
        @media (max-width: 768px) {
            .bloque-paralelo {
                flex-direction: column !important;
            }
            .columna-mitad {
                width: 100% !important;
            }
            .img-proporcional {
                height: 200px !important;
            }
        }
    </style>
</head>
<body>

    <div class="download-container">
        
        <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 25px; width: 100%;">
            <img id="app-icon" src="" alt="Icono" style="width: 80px; height: 80px; border-radius: 12px; object-fit: cover; flex-shrink: 0;">
            <div style="display: flex; flex-direction: column; justify-content: center;">
                <h1 id="app-title" style="margin: 0; font-size: 1.8rem; color: #fff; line-height: 1.2;">Cargando aporte...</h1>
                
                </p>
                <p id="app-tag" style="display: none;"></p>
            </div>
        </div>

        <div class="bloque-paralelo">
            <div class="columna-mitad">
                <img id="app-gameplay" src="" alt="Gameplay 1" class="img-proporcional">
            </div>
            <div class="columna-mitad">
                <img id="app-gameplay2" src="" alt="Gameplay 2" class="img-proporcional">
            </div>
        </div>

    <div id="app-warning-container"></div>

    <div class="bloque-paralelo">
        <div class="columna-mitad">
            <div class="box-descripcion caja-limpia">
        <div class="bloque-paralelo">
            
            <div class="columna-mitad">
                <div class="box-descripcion caja-limpia">
                    <h3 style="color: var(--accent); margin-top: 0; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
                        <i class="fa-solid fa-file-lines"></i> Descripción
                    </h3>
                    <p id="app-description" style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin: 0; white-space: pre-line; word-break: break-word;">Cargando detalles...</p>
                </div>
            </div>

            <div class="columna-mitad">
                <div class="box-requisitos caja-limpia">
                    <h3 style="color: var(--accent); margin-top: 0; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
                        <i class="fa-solid fa-list"></i> Requisitos del Sistema
                    </h3>
                    <p id="app-requirements" style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin: 0; white-space: pre-line; word-break: break-word;">Cargando requisitos...</p>
                </div>
            </div>

        </div>

        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 30px 0; min-height: 80px;">
            <button id="action-btn" class="btn-action btn-generate" onclick="startCountdown()">
                <i class="fa-solid fa-key"></i> Generar enlace al aporte
            </button>
        </div>

    </div>

    <script>
    function startCountdown() {
        const btn = document.getElementById('action-btn');
        let seconds = 5;

        btn.disabled = true;
        btn.className = "btn-action btn-waiting";
        btn.innerHTML = `<i class="fa-solid fa-clock"></i> Espera <span id="countdown-number">${seconds}</span> segundos...`;

        const interval = setInterval(() => {
            seconds--;
            if (seconds > 0) {
                const counterElement = document.getElementById("countdown-number");
                if (counterElement) counterElement.innerText = seconds;
            } else {
                clearInterval(interval);
                btn.disabled = false;
                btn.className = "btn-action btn-download"; 
                btn.innerHTML = `<i class="fa-solid fa-circle-down"></i> DESCARGAR AHORA`;
                btn.removeAttribute('onclick');
                
                btn.onclick = (e) => { 
                    e.preventDefault();
                    if (typeof downloadUrl !== 'undefined' && downloadUrl !== "#") {
                        window.open('https://omg10.com', '_blank'); 
                        window.location.href = downloadUrl; 
                        const thanksModal = document.getElementById("thanks-modal");
                        if (thanksModal) thanksModal.style.display = "flex";
                    } else {
                        alert("El enlace aún no está listo.");
                    }
                };
            }
        }, 1000);
    }
    </script>

    <div id="thanks-modal" class="modal-thanks-overlay" style="display: none;">
        <div class="modal-thanks-box">
            <h2>¡Gracias por <span>visitar</span>nuestra página!</h2>
            <img class="modal-thanks-gif" src="img/grax.gif" alt="Gracias">
            <button class="btn-back-home" onclick="window.location.href='index.html'">
                <i class="fa-solid fa-arrow-left"></i> Volver al Inicio
            </button>
        </div>
    </div>

    <script src="./funciones/index2.js"></script>
</body>
</html>
