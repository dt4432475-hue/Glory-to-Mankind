<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glory To Mankind</title>
    <link rel="stylesheet" href="../estilos/index.css">
    <link rel="stylesheet" href="../estilos/secciones.css">
</head>
<body>

    <!-- ANUNCIO SUPERIOR -->
    <div class="banner">Espacio Publicitario (Superior)</div>

    <!-- ENCABEZADO DE LA SECCIÓN -->
    <header>
        <h1 class="titulo">PROGRAMAS PC</h1>
    </header>

    <!-- NUEVO: BARRA DE BÚSQUEDA GAMER -->
    <div class="contenedor-buscador">
        <input type="text" id="buscador-gamer" placeholder="Buscar publicación por iniciales...">
    </div>

    <!-- CONTENEDOR LIMITADO CON SCROLL: Albergará las filas de 5 -->
    <div class="zona-scroll-publicaciones">
        <main class="cuadrula-publicaciones" id="lista-isos-gamer"></main>
    </div>

    <!-- ANUNCIO INFERIOR -->
    <div class="ad-slot ad-middle">Espacio Publicitario (Contenido Inferior)</div>

    <!-- FOOTER SIMPLE PERO GAMER -->
    <footer>
        <img src="https://postimg.cc" alt="Gamer GIF" class="footer-gif">
        <p>© 2026 Glory to Mankind - Todos los derechos reservados.</p>
    </footer>

      <!-- VENTANA FLOTANTE (MODAL DE ESPERA DE DESCARGA) -->
    <div id="modal-descarga-gamer" class="modal-overlay">
        <div class="modal-contenedor">
            <span class="cerrar-modal" onclick="cerrarModalGamer()">&times;</span>
            
            <h2 class="modal-titulo-espera">PREPARANDO DESCARGA...</h2>
            
            <!-- ANUNCIO PUBLICITARIO DENTRO DEL CONTADOR -->
            <div class="anuncio-modal">
                <p>[ Aquí pegas el código del Anuncio que verán mientras esperan ]</p>
            </div>

            <!-- CONTADOR DE TIEMPO / BOTÓN FINAL -->
            <div id="zona-contador-boton">
                <p class="texto-contador">Tu archivo comenzará a descargarse en <span id="segundos-restantes">5</span> segundos...</p>
            </div>
        </div>
    </div>

    <script src="../script.js"></script>
</body>
</html>
